<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MantisAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #08090c;
    --surface:  #0f1116;
    --surface2: #14161d;
    --border:   #1e2029;
    --green:    #45c882;
    --green-dim:#2d8a58;
    --text:     #e2e4ec;
    --text-dim: #6b7080;
    --text-muted: #3d404d;
    --red:      #e05c5c;
    --yellow:   #d4a843;
    --blue:     #5c8fe0;
    --radius:   6px;
    --sidebar:  280px;
    --topbar:   52px;
    --statusbar:32px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.5;
  }

  /* ── Layout ── */
  #app {
    display: grid;
    grid-template-rows: var(--topbar) 1fr var(--statusbar);
    grid-template-columns: var(--sidebar) 1fr;
    grid-template-areas:
      "topbar  topbar"
      "sidebar main"
      "status  status";
    height: 100vh;
    overflow: hidden;
  }

  /* ── Top bar ── */
  #topbar {
    grid-area: topbar;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-size: 15px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--text-dim); font-weight: 400; }

  #model-badge {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--green);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 260px;
  }

  /* ── Sidebar ── */
  #sidebar {
    grid-area: sidebar;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .field-group { display: flex; flex-direction: column; gap: 8px; }

  label {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 3px;
    display: block;
  }

  input[type="text"],
  input[type="password"],
  input[type="number"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus { border-color: var(--green-dim); }

  /* ── Provider quick-select ── */
  .provider-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .provider-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 11px;
    padding: 6px 8px;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.15s, color 0.15s;
  }

  .provider-btn:hover {
    border-color: var(--green-dim);
    color: var(--green);
  }

  /* ── Buttons ── */
  .btn {
    background: var(--green);
    border: none;
    border-radius: var(--radius);
    color: var(--bg);
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    padding: 8px 14px;
    cursor: pointer;
    transition: opacity 0.15s;
    width: 100%;
  }

  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    font-weight: 500;
  }

  .btn-secondary:hover { border-color: var(--green-dim); }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 2px 0;
  }

  /* ── Save feedback ── */
  #save-msg {
    font-size: 11px;
    color: var(--green);
    height: 16px;
    text-align: center;
  }

  /* ── Tools list ── */
  #tools-list {
    font-size: 11px;
    color: var(--text-dim);
    max-height: 120px;
    overflow-y: auto;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 8px;
    line-height: 1.8;
  }

  #jobs-list {
    font-size: 11px;
    color: var(--text-dim);
    max-height: 180px;
    overflow-y: auto;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 8px;
    line-height: 1.6;
  }

  #approvals-list {
    font-size: 11px;
    color: var(--text-dim);
    max-height: 220px;
    overflow-y: auto;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 8px;
    line-height: 1.6;
  }

  #activity-list {
    font-size: 11px;
    color: var(--text-dim);
    max-height: 220px;
    overflow-y: auto;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 8px;
    line-height: 1.5;
  }

  .job-item {
    border-bottom: 1px solid var(--border);
    padding: 6px 0;
  }

  .job-detail {
    margin-top: 8px;
    padding: 10px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .job-detail-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .job-plan {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .job-plan-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  .job-plan-dot {
    width: 8px;
    height: 8px;
    margin-top: 5px;
    border-radius: 999px;
    background: var(--text-muted);
    flex-shrink: 0;
  }

  .job-plan-dot.done { background: var(--green); }
  .job-plan-dot.running { background: var(--blue); }
  .job-plan-dot.failed { background: var(--red); }
  .job-plan-dot.awaiting_approval { background: var(--yellow); }

  .job-plan-main {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .job-plan-title {
    color: var(--text);
    font-size: 12px;
  }

  .job-plan-files {
    color: var(--text-muted);
    font-size: 11px;
    word-break: break-word;
  }

  .job-verifier {
    margin-top: 8px;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.4;
  }

  .job-verifier.pass {
    border-color: rgba(74,183,111,0.45);
    background: rgba(74,183,111,0.07);
  }

  .job-verifier.fail {
    border-color: rgba(209,73,91,0.45);
    background: rgba(209,73,91,0.08);
  }

  .job-item:last-child,
  .approval-item:last-child { border-bottom: none; }

  .approval-item {
    border-bottom: 1px solid var(--border);
    padding: 8px 0;
  }

  .activity-item {
    border-bottom: 1px solid var(--border);
    padding: 7px 0;
  }

  .job-head {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .job-status {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .job-status.queued { color: var(--yellow); border-color: var(--yellow); }
  .job-status.running { color: var(--blue); border-color: var(--blue); }
  .job-status.done { color: var(--green); border-color: var(--green); }
  .job-status.failed { color: var(--red); border-color: var(--red); }
  .job-status.awaiting_approval { color: var(--yellow); border-color: var(--yellow); }

  .job-prompt {
    margin-top: 4px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .approval-meta {
    margin-top: 4px;
    color: var(--text);
    word-break: break-word;
  }

  .approval-note {
    margin-top: 6px;
  }

  .approval-preview {
    margin-top: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px;
    max-height: 180px;
    overflow: auto;
    white-space: pre-wrap;
    color: var(--text);
  }

  .approval-actions {
    display: flex;
    gap: 6px;
    margin-top: 6px;
  }

  .approval-actions .btn {
    width: auto;
    flex: 1;
    padding: 6px 10px;
  }

  .activity-head {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .activity-type {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    border: 1px solid var(--border);
    color: var(--blue);
  }

  .activity-time {
    margin-left: auto;
    color: var(--text-muted);
    font-size: 10px;
  }

  .activity-msg {
    margin-top: 4px;
    color: var(--text);
    word-break: break-word;
  }

  /* ── Main / Chat ── */
  #main {
    grid-area: main;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── Message bubbles ── */
  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-width: 820px;
  }

  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.assistant { align-self: flex-start; align-items: flex-start; }

  .msg-role {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .msg.user .msg-role { color: var(--green-dim); }

  .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.6;
  }

  .msg.user .msg-bubble {
    background: var(--surface2);
    border-color: var(--green-dim);
  }

  .msg-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 12px;
    border: 1px solid;
  }

  .badge-type {
    color: var(--yellow);
    border-color: var(--yellow);
    background: rgba(212,168,67,0.08);
  }

  .badge-model {
    color: var(--blue);
    border-color: var(--blue);
    background: rgba(92,143,224,0.08);
  }

  .badge-tasks {
    color: var(--text-dim);
    border-color: var(--border);
  }

  /* ── Code block rendering ── */
  .msg-bubble pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 12px;
  }

  .msg-bubble code:not(pre code) {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 12px;
  }

  .msg-bubble p { margin: 4px 0; }
  .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--green);
    margin: 8px 0 4px;
  }
  .msg-bubble ul, .msg-bubble ol {
    padding-left: 18px;
    margin: 4px 0;
  }

  /* ── Stream status indicator ── */
  .stream-status {
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 4px;
    min-height: 14px;
    font-style: italic;
  }

  /* ── Loading indicator ── */
  .msg.loading .msg-bubble {
    color: var(--text-dim);
  }

  .spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Input area ── */
  #input-area {
    padding: 12px 24px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #prompt-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    resize: none;
    min-height: 44px;
    max-height: 180px;
    overflow-y: auto;
    line-height: 1.5;
    transition: border-color 0.15s;
  }

  #prompt-input:focus { border-color: var(--green-dim); }

  #send-btn {
    width: 80px;
    height: 44px;
    flex-shrink: 0;
    padding: 0;
  }

  /* ── Status bar ── */
  #statusbar {
    grid-area: status;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 18px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
    display: inline-block;
  }

  .status-dot.ok { background: var(--green); }
  .status-dot.err { background: var(--red); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ── Task tree panel ── */
  #task-tree {
    display: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }

  #task-tree-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 24px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  #task-tree-header:hover { color: var(--text); }

  #task-tree-chevron {
    margin-left: auto;
    transition: transform 0.15s;
    font-style: normal;
  }

  #task-tree.collapsed #task-tree-chevron { transform: rotate(-90deg); }

  #task-tree-body {
    padding: 8px 24px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  #task-tree.collapsed #task-tree-body { display: none; }

  .task-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
  }

  .task-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--text-muted);
    transition: background 0.2s;
  }

  .task-dot.running {
    background: var(--blue);
    animation: pulse-dot 1s ease-in-out infinite;
  }

  .task-dot.done { background: none; }

  .task-check {
    width: 8px;
    height: 8px;
    flex-shrink: 0;
    color: var(--green);
    font-size: 10px;
    line-height: 1;
    display: none;
  }

  .task-dot.done + .task-check { display: inline; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(1.3); }
  }

  .task-type-badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    border: 1px solid var(--yellow);
    color: var(--yellow);
    background: rgba(212,168,67,0.08);
    flex-shrink: 0;
  }

  .task-title {
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .task-files {
    margin-left: 24px;
    color: var(--text-muted);
    font-size: 10px;
    line-height: 1.4;
    word-break: break-word;
  }

  /* ── Empty state ── */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    gap: 8px;
    pointer-events: none;
  }

  #empty-state .em-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-dim);
  }

  #empty-state .em-sub {
    font-size: 12px;
  }
</style>
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <header id="topbar">
    <div class="logo">mantis<span>AI</span></div>
    <div id="model-badge">loading…</div>
  </header>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="section-label">Configuration</div>

    <div class="field-group">
      <label for="api-key-input">API Key</label>
      <input id="api-key-input" type="password" placeholder="sk-…" autocomplete="off" />

      <label for="base-url-input">Base URL</label>
      <input id="base-url-input" type="text" placeholder="https://api.openai.com/v1" />

      <label for="model-input">Model</label>
      <input id="model-input" type="text" placeholder="gpt-4o-mini" />

      <label for="budget-input">Hard Budget USD</label>
      <input id="budget-input" type="number" min="0" step="0.001" placeholder="0.050" />
    </div>

    <div class="section-label">Provider Presets</div>
    <div class="provider-grid">
      <button class="provider-btn" data-provider="openai">OpenAI</button>
      <button class="provider-btn" data-provider="qwen">Qwen</button>
      <button class="provider-btn" data-provider="deepseek">DeepSeek</button>
      <button class="provider-btn" data-provider="minimax">MiniMax</button>
    </div>

    <button class="btn" id="save-btn">Save Config</button>
    <div id="save-msg"></div>

    <div class="divider"></div>

    <div class="section-label">Active Tools</div>
    <div id="tools-list">loading…</div>

    <div class="divider"></div>

    <div class="section-label">Background Jobs</div>
    <button class="btn btn-secondary" id="background-btn">Run In Background</button>
    <div id="jobs-list">no jobs yet</div>

    <div class="divider"></div>

    <div class="section-label">Approvals</div>
    <div id="approvals-list">no approvals pending</div>

    <div class="divider"></div>

    <div class="section-label">Activity Feed</div>
    <div id="activity-list">no recent activity</div>
  </aside>

  <!-- Main chat -->
  <main id="main">
    <!-- Task tree panel (shown only for multi-task plans) -->
    <div id="task-tree">
      <div id="task-tree-header">
        <span>Execution Plan</span>
        <span id="task-tree-chevron">&#9660;</span>
      </div>
      <div id="task-tree-body"></div>
    </div>
    <div id="messages">
      <div id="empty-state">
        <div class="em-title">MantisAI</div>
        <div class="em-sub">Configure your API key and start chatting</div>
      </div>
    </div>
    <div id="input-area">
      <textarea id="prompt-input" rows="1" placeholder="Ask MantisAI anything… (Enter to send, Shift+Enter for newline)"></textarea>
      <button class="btn" id="send-btn">Send</button>
    </div>
  </main>

  <!-- Status bar -->
  <footer id="statusbar">
    <span class="status-dot" id="health-dot"></span>
    <span id="health-text">connecting…</span>
    <span style="margin-left:auto" id="model-status"></span>
  </footer>

</div>

<script>
// ---------------------------------------------------------------------------
// Provider presets
// ---------------------------------------------------------------------------
const PROVIDERS = {
  openai:   { base_url: 'https://api.openai.com/v1',                              model: 'gpt-4o-mini' },
  qwen:     { base_url: 'https://dashscope.aliyuncs.com/compatible-mode/v1',      model: 'qwen-plus' },
  deepseek: { base_url: 'https://api.deepseek.com/v1',                            model: 'deepseek-chat' },
  minimax:  { base_url: 'https://api.minimax.chat/v1',                            model: 'abab6.5s-chat' },
};

// ---------------------------------------------------------------------------
// DOM refs
// ---------------------------------------------------------------------------
const $messages    = document.getElementById('messages');
const $emptyState  = document.getElementById('empty-state');
const $promptInput = document.getElementById('prompt-input');
const $sendBtn     = document.getElementById('send-btn');
const $saveBtn     = document.getElementById('save-btn');
const $saveMsg     = document.getElementById('save-msg');
const $apiKey      = document.getElementById('api-key-input');
const $baseUrl     = document.getElementById('base-url-input');
const $modelInput  = document.getElementById('model-input');

// ---------------------------------------------------------------------------
// State

let isSending = false;
let jobsPollHandle = null;
let approvalsPollHandle = null;
let activityPollHandle = null;
const sessionId = (() => {
  const key = 'mantis_session_id';
  let existing = window.localStorage.getItem(key);
  if (!existing) {
    existing = `session-${Math.random().toString(36).slice(2, 10)}`;
    window.localStorage.setItem(key, existing);
  }
  return existing;
})();

// ---------------------------------------------------------------------------
// Task tree helpers
// ---------------------------------------------------------------------------
function initTaskTree(tasks) {
  // Populate rows
  $taskTreeBody.innerHTML = '';
  tasks.forEach((task) => {
    const row = document.createElement('div');
    row.className = 'task-row';
    row.dataset.index = task._index;

    const dot = document.createElement('span');
    dot.className = 'task-dot';

    const check = document.createElement('span');
    check.className = 'task-check';
    check.textContent = '✓';

    const badge = document.createElement('span');
    badge.className = 'task-type-badge';
    badge.textContent = task.task_type;

    const title = document.createElement('span');
    title.className = 'task-title';
    title.textContent = task.title;

    row.appendChild(dot);
    row.appendChild(check);
    row.appendChild(badge);
    row.appendChild(title);
    $taskTreeBody.appendChild(row);

    if (task.file_targets && task.file_targets.length) {
      const files = document.createElement('div');
      files.className = 'task-files';
      files.textContent = task.file_targets.join(', ');
      $taskTreeBody.appendChild(files);
    }
  });

  // Show panel (expanded)
  $taskTree.classList.remove('collapsed');
  $taskTree.style.display = '';
}

function updateTaskStatus(index, status) {
  const row = $taskTreeBody.querySelector(`.task-row[data-index="${index}"]`);
  if (!row) return;
  const dot = row.querySelector('.task-dot');
  if (status === 'running') {
    dot.className = 'task-dot running';
  } else if (status === 'done') {
    dot.className = 'task-dot done';
  }
}

function resetTaskTree() {
  $taskTree.style.display = 'none';
  $taskTreeBody.innerHTML = '';
}

// Collapse/expand toggle
$taskTreeHdr.addEventListener('click', () => {
  $taskTree.classList.toggle('collapsed');
});

// ---------------------------------------------------------------------------
// Utility: simple markdown renderer
// ---------------------------------------------------------------------------
function renderMarkdown(text) {
  // Escape HTML first
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Extract and protect code blocks
  const blocks = [];
  let html = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const idx = blocks.length;
    blocks.push(`<pre><code>${esc(code.trimEnd())}</code></pre>`);
    return `\x00BLOCK${idx}\x00`;
  });

  // Inline code
  html = html.replace(/`([^`]+)`/g, (_, c) => `<code>${esc(c)}</code>`);

  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm,   '<h1>$1</h1>');

  // Lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');

  // Paragraphs (double newline)
  html = html.replace(/\n\n+/g, '</p><p>');
  html = `<p>${html}</p>`;

  // Single newlines become <br> inside paragraphs
  html = html.replace(/\n/g, '<br>');

  // Restore code blocks
  html = html.replace(/\x00BLOCK(\d+)\x00/g, (_, i) => blocks[+i]);

  return html;
}

// ---------------------------------------------------------------------------
// Messages
// ---------------------------------------------------------------------------
function hideEmpty() {
  if ($emptyState) $emptyState.style.display = 'none';
}

function appendMessage(role, text, meta = {}) {
  hideEmpty();
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;

  const roleEl = document.createElement('div');
  roleEl.className = 'msg-role';
  roleEl.textContent = role === 'user' ? 'You' : 'MantisAI';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (role === 'assistant') {
    bubble.innerHTML = renderMarkdown(text);
  } else {
    bubble.textContent = text;
  }

  msg.appendChild(roleEl);
  msg.appendChild(bubble);

  // Meta badges for assistant
  if (role === 'assistant' && (meta.task_type || meta.model || meta.subtasks_count > 1)) {
    const metaEl = document.createElement('div');
    metaEl.className = 'msg-meta';

    if (meta.model) {
      const b = document.createElement('span');
      b.className = 'badge badge-model';
      b.textContent = meta.model;
      metaEl.appendChild(b);
    }
    if (meta.task_type) {
      const b = document.createElement('span');
      b.className = 'badge badge-type';
      b.textContent = meta.task_type;
      metaEl.appendChild(b);
    }
    if (meta.subtasks_count > 1) {
      const b = document.createElement('span');
      b.className = 'badge badge-tasks';
      b.textContent = `${meta.subtasks_count} subtasks`;
      metaEl.appendChild(b);
    }
    msg.appendChild(metaEl);
  }

  $messages.appendChild(msg);
  $messages.scrollTop = $messages.scrollHeight;
  return msg;
}

function appendLoading() {
  hideEmpty();
  const msg = document.createElement('div');
  msg.className = 'msg assistant loading';

  const roleEl = document.createElement('div');
  roleEl.className = 'msg-role';
  roleEl.textContent = 'MantisAI';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = '<span class="spinner"></span>thinking…';

  msg.appendChild(roleEl);
  msg.appendChild(bubble);
  $messages.appendChild(msg);
  $messages.scrollTop = $messages.scrollHeight;
  return msg;
}

// ---------------------------------------------------------------------------
// API calls
// ---------------------------------------------------------------------------
async function loadConfig() {
  try {
    const res = await fetch('/api/config');
    if (!res.ok) return;
    const data = await res.json();
    $baseUrl.value     = data.base_url     || '';
    $modelInput.value  = data.model        || '';
    $budgetInput.value = data.budget_usd ?? '';
    $modelBadge.textContent = data.model   || 'no model';
    $modelStatus.textContent = data.budget_usd != null
      ? `${data.model || ''} · budget $${Number(data.budget_usd).toFixed(3)}`
      : (data.model || '');
    if (data.api_key_masked) {
      $apiKey.placeholder = data.api_key_masked;
    }
    if (data.tools && data.tools.length > 0) {
      $toolsList.textContent = data.tools.join('\n');
    } else {
      $toolsList.textContent = 'none';
    }
  } catch (e) {
    console.error('loadConfig error', e);
  }
}

function renderJobs(jobs) {
  if (!jobs || jobs.length === 0) {
    $jobsList.textContent = 'no jobs yet';
    return;
  }

  $jobsList.innerHTML = '';
  jobs.forEach(job => {
    const item = document.createElement('div');
    item.className = 'job-item';

    const head = document.createElement('div');
    head.className = 'job-head';

    const status = document.createElement('span');
    status.className = `job-status ${job.status}`;
    status.textContent = job.status;

    const meta = document.createElement('span');
    meta.textContent = job.model || '';

    const prompt = document.createElement('div');
    prompt.className = 'job-prompt';
    prompt.textContent = job.prompt;

    head.appendChild(status);
    head.appendChild(meta);
    item.appendChild(head);
    item.appendChild(prompt);
    const detail = renderJobDetail(job);
    if (detail) item.appendChild(detail);

    if (job.status === 'done' && job.response) {
      item.title = job.response.slice(0, 400);
    } else if (job.status === 'failed' && job.error) {
      item.title = job.error;
    }

    $jobsList.appendChild(item);
  });
}

function renderJobDetail(job) {
  const metadata = job.metadata || {};
  const plan = metadata.plan;
  const execution = metadata.execution;
  const verifier = execution?.verifier;
  if (!plan && !execution) return null;

  const wrap = document.createElement('div');
  wrap.className = 'job-detail';

  const title = document.createElement('div');
  title.className = 'job-detail-title';
  title.textContent = 'Task Tree';
  wrap.appendChild(title);

  const planWrap = document.createElement('div');
  planWrap.className = 'job-plan';
  const taskList = execution?.tasks || plan?.tasks || [];
  taskList.forEach(task => {
    const row = document.createElement('div');
    row.className = 'job-plan-row';

    const dot = document.createElement('span');
    dot.className = `job-plan-dot ${task.status || job.status || 'queued'}`;

    const main = document.createElement('div');
    main.className = 'job-plan-main';

    const taskTitle = document.createElement('div');
    taskTitle.className = 'job-plan-title';
    taskTitle.textContent = task.title || task.prompt || 'untitled task';

    const files = document.createElement('div');
    files.className = 'job-plan-files';
    const detailParts = [
      task.task_type || null,
      (task.file_targets || []).length ? task.file_targets.join(', ') : null,
      task.artifact_check?.message || null,
    ].filter(Boolean);
    files.textContent = detailParts.join(' · ');

    main.appendChild(taskTitle);
    main.appendChild(files);
    row.appendChild(dot);
    row.appendChild(main);
    planWrap.appendChild(row);
  });
  wrap.appendChild(planWrap);

  if (verifier) {
    const verifierEl = document.createElement('div');
    verifierEl.className = `job-verifier ${(verifier.verdict || 'pass').toLowerCase()}`;
    verifierEl.textContent = [
      `Verifier: ${verifier.verdict || 'pass'}`,
      verifier.reason || null,
      Array.isArray(verifier.missing) && verifier.missing.length ? `Missing: ${verifier.missing.join(', ')}` : null,
      verifier.revised ? 'Revision pass was required.' : null,
    ].filter(Boolean).join(' · ');
    wrap.appendChild(verifierEl);
  }

  return wrap;
}

function renderApprovals(approvals) {
  const pending = (approvals || []).filter(a => a.status === 'pending');
  if (pending.length === 0) {
    $approvalsList.textContent = 'no approvals pending';
    return;
  }

  $approvalsList.innerHTML = '';
  pending.forEach(approval => {
    const item = document.createElement('div');
    item.className = 'approval-item';

    const head = document.createElement('div');
    head.className = 'job-head';

    const status = document.createElement('span');
    status.className = 'job-status awaiting_approval';
    status.textContent = approval.risk_level.toLowerCase();

    const tool = document.createElement('span');
    tool.textContent = approval.tool_name;

    const meta = document.createElement('div');
    meta.className = 'approval-meta';
    meta.textContent = JSON.stringify(approval.tool_input);

    const preview = document.createElement('pre');
    preview.className = 'approval-preview';
    const previewData = approval.metadata?.preview || {};
    if (previewData.kind === 'diff') {
      preview.textContent = previewData.diff || '(empty diff)';
    } else if (previewData.kind === 'command') {
      preview.textContent = `${previewData.command || ''}\n(timeout: ${previewData.timeout ?? 120}s)`;
    } else {
      preview.textContent = previewData.message || 'No preview available.';
    }

    const note = document.createElement('input');
    note.className = 'approval-note';
    note.type = 'text';
    note.placeholder = 'optional note';

    const actions = document.createElement('div');
    actions.className = 'approval-actions';

    const approveBtn = document.createElement('button');
    approveBtn.className = 'btn';
    approveBtn.textContent = 'Approve';
    approveBtn.addEventListener('click', () => decideApproval(approval.id, 'approve', note.value));

    const denyBtn = document.createElement('button');
    denyBtn.className = 'btn btn-secondary';
    denyBtn.textContent = 'Deny';
    denyBtn.addEventListener('click', () => decideApproval(approval.id, 'deny', note.value));

    head.appendChild(status);
    head.appendChild(tool);
    actions.appendChild(approveBtn);
    actions.appendChild(denyBtn);
    item.appendChild(head);
    item.appendChild(meta);
    item.appendChild(preview);
    item.appendChild(note);
    item.appendChild(actions);
    $approvalsList.appendChild(item);
  });
}

function relativeTime(iso) {
  const deltaMs = Date.now() - new Date(iso).getTime();
  const seconds = Math.max(Math.floor(deltaMs / 1000), 0);
  if (seconds < 60) return `${seconds}s ago`;
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return `${minutes}m ago`;
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return `${hours}h ago`;
  return `${Math.floor(hours / 24)}d ago`;
}

function renderActivity(events) {
  if (!events || events.length === 0) {
    $activityList.textContent = 'no recent activity';
    return;
  }

  $activityList.innerHTML = '';
  events.forEach(event => {
    const item = document.createElement('div');
    item.className = 'activity-item';

    const head = document.createElement('div');
    head.className = 'activity-head';

    const type = document.createElement('span');
    type.className = 'activity-type';
    type.textContent = event.event_type.replaceAll('_', ' ');

    const time = document.createElement('span');
    time.className = 'activity-time';
    time.textContent = relativeTime(event.created_at);

    const msg = document.createElement('div');
    msg.className = 'activity-msg';
    msg.textContent = event.message;

    head.appendChild(type);
    head.appendChild(time);
    item.appendChild(head);
    item.appendChild(msg);
    $activityList.appendChild(item);
  });
}

async function loadJobs() {
  try {
    const res = await fetch('/api/jobs');
    if (!res.ok) return;
    const data = await res.json();
    renderJobs(data.jobs || []);
  } catch (e) {
    console.error('loadJobs error', e);
  }
}

async function loadApprovals() {
  try {
    const res = await fetch('/api/approvals?status=pending');
    if (!res.ok) return;
    const data = await res.json();
    renderApprovals(data.approvals || []);
  } catch (e) {
    console.error('loadApprovals error', e);
  }
}

async function loadActivity() {
  try {
    const res = await fetch(`/api/activity?session_id=${encodeURIComponent(sessionId)}&limit=25`);
    if (!res.ok) return;
    const data = await res.json();
    renderActivity(data.events || []);
  } catch (e) {
    console.error('loadActivity error', e);
  }
}

async function decideApproval(approvalId, action, note = '') {
  try {
    const res = await fetch(`/api/approvals/${approvalId}/${action}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ note: note || null }),
    });
    const data = await res.json();
    if (!res.ok) {
      appendMessage('assistant', `Approval error: ${data.detail || res.statusText}`);
      return;
    }
    await Promise.all([loadApprovals(), loadJobs()]);
    await loadActivity();
    if (action === 'approve') {
      appendMessage('assistant', 'approval granted. the job resumed from its checkpoint and will continue in the background.');
    } else {
      appendMessage('assistant', 'approval denied. the background job was stopped.');
    }
  } catch (e) {
    appendMessage('assistant', `Approval error: ${e.message}`);
  }
}

async function checkHealth() {
  try {
    const res = await fetch('/api/health');
    const data = await res.json();
    $healthDot.className = 'status-dot ok';
    $healthText.textContent = `online · v${data.version}`;
  } catch {
    $healthDot.className = 'status-dot err';
    $healthText.textContent = 'offline';
  }
}

async function saveConfig() {
  $saveBtn.disabled = true;
  $saveMsg.textContent = '';
  try {
    const body = {
      model:    $modelInput.value.trim() || null,
      base_url: $baseUrl.value.trim()   || null,
    };
    const budgetVal = $budgetInput.value.trim();
    if (budgetVal) body.budget_usd = Number(budgetVal);
    // Only send api_key if user typed something
    const keyVal = $apiKey.value.trim();
    if (keyVal) body.api_key = keyVal;

    const res = await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (data.ok) {
      $saveMsg.textContent = 'saved ✓';
      // Update badge
      if ($modelInput.value) {
        $modelBadge.textContent = $modelInput.value;
        $modelStatus.textContent = budgetVal
          ? `${$modelInput.value} · budget $${Number(budgetVal).toFixed(3)}`
          : $modelInput.value;
      }
      // Clear key field (it's now masked)
      $apiKey.value = '';
      $apiKey.placeholder = '••••••••';
      setTimeout(() => { $saveMsg.textContent = ''; }, 2500);
    }
  } catch (e) {
    $saveMsg.textContent = 'error saving';
  } finally {
    $saveBtn.disabled = false;
  }
}

function createStreamingBubble() {
  hideEmpty();
  const msg = document.createElement('div');
  msg.className = 'msg assistant';

  const roleEl = document.createElement('div');
  roleEl.className = 'msg-role';
  roleEl.textContent = 'MantisAI';

  const statusEl = document.createElement('div');
  statusEl.className = 'stream-status';
  statusEl.textContent = '';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = '';

  const metaEl = document.createElement('div');
  metaEl.className = 'msg-meta';

  msg.appendChild(roleEl);
  msg.appendChild(statusEl);
  msg.appendChild(bubble);
  msg.appendChild(metaEl);
  $messages.appendChild(msg);
  $messages.scrollTop = $messages.scrollHeight;

  return { msg, statusEl, bubble, metaEl };
}

async function sendMessage() {
  const prompt = $promptInput.value.trim();
  if (!prompt || isSending) return;

  isSending = true;
  $sendBtn.disabled = true;
  $promptInput.value = '';
  autoResize($promptInput);

  appendMessage('user', prompt);

  resetTaskTree();

  const { msg, statusEl, bubble, metaEl } = createStreamingBubble();
  // Show spinner initially
  bubble.innerHTML = '<span class="spinner"></span>thinking…';

  let rawText = '';
  let hasContent = false;

  try {
    const res = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, session_id: sessionId }),
    });

    if (!res.ok) {
      const data = await res.json().catch(() => ({ detail: res.statusText }));
      bubble.innerHTML = '';
      bubble.textContent = `Error: ${data.detail || res.statusText}`;
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let lineBuffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      lineBuffer += decoder.decode(value, { stream: true });
      const lines = lineBuffer.split('\n');
      lineBuffer = lines.pop(); // keep incomplete line

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const jsonStr = line.slice(6).trim();
        if (!jsonStr) continue;

        let evt;
        try { evt = JSON.parse(jsonStr); } catch { continue; }

        if (evt.type === 'plan') {
          // Annotate tasks with their index and show the tree
          const tasks = evt.tasks.map((t, idx) => ({ ...t, _index: idx }));
          initTaskTree(tasks);
          statusEl.textContent = evt.execution_mode === 'coordinator_worker_verifier'
            ? 'Planning with coordinator/verifier…'
            : 'Planning direct execution…';

        } else if (evt.type === 'task_update') {
          updateTaskStatus(evt.index, evt.status);

        } else if (evt.type === 'status') {
          statusEl.textContent = evt.text;

        } else if (evt.type === 'token') {
          if (!hasContent) {
            bubble.innerHTML = '';
            hasContent = true;
          }
          rawText += evt.content;
          bubble.innerHTML = renderMarkdown(rawText);
          $messages.scrollTop = $messages.scrollHeight;

        } else if (evt.type === 'done') {
          statusEl.textContent = '';
          // Add metadata badges
          const model = $modelInput.value || $modelBadge.textContent;
          if (model) {
            const b = document.createElement('span');
            b.className = 'badge badge-model';
            b.textContent = model;
            metaEl.appendChild(b);
          }
          if (evt.task_type) {
            const b = document.createElement('span');
            b.className = 'badge badge-type';
            b.textContent = evt.task_type;
            metaEl.appendChild(b);
          }
          if (evt.subtasks > 1) {
            const b = document.createElement('span');
            b.className = 'badge badge-tasks';
            b.textContent = `${evt.subtasks} subtasks`;
            metaEl.appendChild(b);
          }
          if (evt.total_cost != null) {
            const b = document.createElement('span');
            b.className = 'badge badge-tasks';
            b.textContent = `$${evt.total_cost.toFixed(6)}`;
            metaEl.appendChild(b);
          }
          if (evt.remaining_budget_usd != null) {
            const b = document.createElement('span');
            b.className = 'badge badge-tasks';
            b.textContent = `left $${evt.remaining_budget_usd.toFixed(6)}`;
            metaEl.appendChild(b);
          }
          if (evt.execution_mode) {
            const b = document.createElement('span');
            b.className = 'badge badge-type';
            b.textContent = evt.execution_mode === 'coordinator_worker_verifier' ? 'coord+verify' : 'direct';
            metaEl.appendChild(b);
          }
          if (evt.verifier_verdict) {
            const b = document.createElement('span');
            b.className = 'badge badge-model';
            b.textContent = `verifier ${evt.verifier_verdict}`;
            metaEl.appendChild(b);
          }
          if (evt.verifier_reason) {
            statusEl.textContent = evt.verifier_reason;
          }

        } else if (evt.type === 'error') {
          statusEl.textContent = '';
          bubble.innerHTML = '';
          bubble.textContent = `Error: ${evt.message}`;
        }
      }
    }

    // If no tokens came through (e.g. empty response), clear spinner
    if (!hasContent) {
      bubble.innerHTML = '';
      bubble.textContent = '(no response)';
    }

  } catch (e) {
    bubble.innerHTML = '';
    bubble.textContent = `Network error: ${e.message}`;
  } finally {
    isSending = false;
    $sendBtn.disabled = false;
    $promptInput.focus();
  }
}

async function sendBackgroundJob() {
  const prompt = $promptInput.value.trim();
  if (!prompt || isSending) return;

  $promptInput.value = '';
  autoResize($promptInput);
  appendMessage('user', prompt);
  appendMessage(
    'assistant',
    'queued as background job. watch the jobs panel for progress, approvals, verifier status, and resume events.',
    { model: $modelInput.value || $modelBadge.textContent }
  );

  try {
    const res = await fetch('/api/jobs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, session_id: sessionId }),
    });
    const data = await res.json();
    if (!res.ok) {
      appendMessage('assistant', `Error: ${data.detail || res.statusText}`);
      return;
    }
    await loadJobs();
  } catch (e) {
    appendMessage('assistant', `Network error: ${e.message}`);
  }
}

// ---------------------------------------------------------------------------
// UI helpers
// ---------------------------------------------------------------------------
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 180) + 'px';
}

// ---------------------------------------------------------------------------
// Event listeners
// ---------------------------------------------------------------------------
$promptInput.addEventListener('input', () => autoResize($promptInput));

$promptInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

$sendBtn.addEventListener('click', sendMessage);
$backgroundBtn.addEventListener('click', sendBackgroundJob);
$saveBtn.addEventListener('click', saveConfig);

// Provider quick-select
document.querySelectorAll('.provider-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const preset = PROVIDERS[btn.dataset.provider];
      if (preset) {
        $baseUrl.value    = preset.base_url;
        $modelInput.value = preset.model;
        $modelBadge.textContent = preset.model;
      }
  });
});

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
(async () => {
  await Promise.all([checkHealth(), loadConfig(), loadJobs(), loadApprovals(), loadActivity()]);
  jobsPollHandle = window.setInterval(loadJobs, 5000);
  approvalsPollHandle = window.setInterval(loadApprovals, 5000);
  activityPollHandle = window.setInterval(loadActivity, 5000);
  $promptInput.focus();
})();
</script>
</body>
</html>
