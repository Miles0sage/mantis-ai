name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-and-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Full Test Suite
        run: pytest -q tests

      - name: Scenario Benchmark
        run: python scripts/scenario_benchmark.py --loops 1 --include-server

      - name: Stress Benchmark
        run: python scripts/stress_benchmark.py --loops 10

      - name: Publish Run Summary
        run: |
          echo "## MANTIS CI" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- tests: pytest -q tests" >> "$GITHUB_STEP_SUMMARY"
          echo "- scenario benchmark: $(cat .omc/state/benchmark-reports/latest-summary.json)" >> "$GITHUB_STEP_SUMMARY"
          echo "- stress benchmark: $(cat .omc/state/stress-benchmark-reports/latest-summary.json)" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Benchmark Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mantis-benchmark-reports
          path: |
            .omc/state/benchmark-reports
            .omc/state/stress-benchmark-reports
